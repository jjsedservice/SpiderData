<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Google Maps 卫星预览</title>
  <script src="./tianditu_geocode_cache.js"></script>
  <style>
    :root {
      color-scheme: light;
      --bg: #f1ede2;
      --panel: rgba(255, 252, 245, 0.94);
      --text: #1f2937;
      --muted: #5f6b7a;
      --accent: #135d66;
      --border: rgba(19, 93, 102, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: radial-gradient(circle at top left, #fffdf7 0%, var(--bg) 58%, #ddd6c4 100%);
      color: var(--text);
    }

    .shell {
      display: grid;
      grid-template-columns: 360px 1fr;
      width: 100%;
      height: 100%;
    }

    .sidebar {
      padding: 24px 20px;
      background: var(--panel);
      border-right: 1px solid var(--border);
      backdrop-filter: blur(10px);
      overflow-y: auto;
    }

    .title {
      margin: 0 0 10px;
      font-size: 24px;
      line-height: 1.2;
    }

    .desc {
      margin: 0 0 18px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
    }

    .status,
    .error {
      margin: 0 0 14px;
      padding: 12px 14px;
      border-radius: 12px;
      font-size: 13px;
      line-height: 1.6;
      background: rgba(19, 93, 102, 0.08);
      color: var(--accent);
    }

    .error {
      background: rgba(180, 83, 9, 0.12);
      color: #9a3412;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 18px;
    }

    .card {
      padding: 14px;
      border-radius: 14px;
      background: #fff;
      border: 1px solid var(--border);
    }

    .card-label {
      display: block;
      margin-bottom: 6px;
      color: var(--muted);
      font-size: 12px;
    }

    .card-value {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .filters {
      margin-bottom: 18px;
      padding: 14px;
      border-radius: 14px;
      background: #fff;
      border: 1px solid var(--border);
    }

    .filters-title {
      display: block;
      margin-bottom: 10px;
      color: var(--muted);
      font-size: 12px;
    }

    .filter-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .filter-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--text);
    }

    .filter-item--all {
      padding-bottom: 8px;
      margin-bottom: 8px;
      border-bottom: 1px solid var(--border);
      font-weight: 600;
    }

    #map {
      width: 100%;
      height: 100%;
    }

    @media (max-width: 960px) {
      .shell {
        grid-template-columns: 1fr;
        grid-template-rows: auto 1fr;
      }

      .sidebar {
        border-right: none;
        border-bottom: 1px solid var(--border);
        max-height: 34vh;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <aside class="sidebar">
      <h1 class="title">Google Maps 卫星预览</h1>
      <p class="desc">
        页面直接读取同目录下的 <code>tianditu_geocode_cache.js</code>，双击打开即可查看。
        当前固定使用 Google Maps 卫星底图，点击点位可查看搜索词、原始地址、标准化地址和发电类型。
      </p>
      <div id="status" class="status">正在初始化 Google Maps...</div>
      <div id="filters" class="filters" hidden>
        <span class="filters-title">发电类型筛选</span>
        <div id="filter-list" class="filter-list"></div>
      </div>
      <div id="stats" class="stats" hidden>
        <div class="card">
          <span class="card-label">成功点位</span>
          <span id="success-count" class="card-value">0</span>
        </div>
        <div class="card">
          <span class="card-label">缓存总数</span>
          <span id="total-count" class="card-value">0</span>
        </div>
      </div>
    </aside>
    <div id="map"></div>
  </div>

  <script>
    const DEFAULT_CENTER = [102.7123, 25.0406];
    const GOOGLE_MAPS_API_KEY = "AIzaSyACJSQOEuMtGBOv5XXTbRk0IW22Aha2W_M";
    const statusEl = document.getElementById("status");
    const filtersEl = document.getElementById("filters");
    const filterListEl = document.getElementById("filter-list");
    const statsEl = document.getElementById("stats");
    const successCountEl = document.getElementById("success-count");
    const totalCountEl = document.getElementById("total-count");

    let map = null;
    let sharedInfoWindow = null;
    const markerEntries = [];
    let successItems = [];
    const DEFAULT_VISIBLE_POWER_TYPES = new Set(["风电", "太阳能发电"]);

    function showError(message) {
      statusEl.className = "error";
      statusEl.textContent = message;
    }

    function createLocation(lng, lat) {
      return { lat, lng };
    }

    function loadGoogleMapsScript() {
      if (typeof google !== "undefined" && google.maps) {
        init();
        return true;
      }

      window.initGoogleMapsPreview = init;

      const script = document.createElement("script");
      script.src = `https://maps.googleapis.com/maps/api/js?key=${encodeURIComponent(GOOGLE_MAPS_API_KEY)}&callback=initGoogleMapsPreview&loading=async`;
      script.async = true;
      script.defer = true;
      script.onerror = function () {
        showError("Google Maps 脚本加载失败。");
      };
      document.head.appendChild(script);
      statusEl.textContent = "正在加载 Google Maps 脚本...";
      return true;
    }

    function initMap() {
      if (typeof google === "undefined" || !google.maps || !google.maps.Map) {
        showError("Google Maps 脚本未成功加载。");
        return false;
      }

      map = new google.maps.Map(document.getElementById("map"), {
        center: createLocation(DEFAULT_CENTER[0], DEFAULT_CENTER[1]),
        zoom: 6,
        mapTypeId: "hybrid",
        streetViewControl: false,
        fullscreenControl: true,
        mapTypeControl: false,
      });
      sharedInfoWindow = new google.maps.InfoWindow({
        content: "",
      });
      statusEl.textContent = "Google Maps 卫星图已加载，正在准备点位...";
      return true;
    }

    function buildPopupHtml(item) {
      return `
        <div style="min-width: 260px; line-height: 1.7;">
          <strong>搜索词:</strong> ${item.query || "-"}<br>
          <strong>企业名称:</strong> ${item.company_name || "-"}<br>
          <strong>发电类型:</strong> ${item.power_type || "-"}<br>
          <strong>原始地址:</strong> ${item.original_address || "-"}<br>
          <strong>标准化地址:</strong> ${item.standard_address || "-"}<br>
          <strong>经度:</strong> ${item.lon}<br>
          <strong>纬度:</strong> ${item.lat}<br>
          <strong>级别:</strong> ${item.level || "-"}
        </div>
      `;
    }

    function addMarker(item, selectedPowerTypes) {
      const lng = Number(item.lon);
      const lat = Number(item.lat);
      if (!Number.isFinite(lng) || !Number.isFinite(lat)) {
        return;
      }

      const point = createLocation(lng, lat);
      const marker = new google.maps.Marker({
        position: point,
        map,
        visible: !selectedPowerTypes || selectedPowerTypes.has(item.power_type || "未标注"),
      });
      const popupHtml = buildPopupHtml(item);

      marker.addListener("click", function () {
        sharedInfoWindow.setContent(popupHtml);
        sharedInfoWindow.open({
          map,
          anchor: marker,
        });
      });

      markerEntries.push({ marker, item });
    }

    function addMarkersInBatches(items, batchSize = 200) {
      let index = 0;
      const selectedPowerTypes = getSelectedPowerTypes();

      function renderBatch() {
        const batch = items.slice(index, index + batchSize);
        batch.forEach((item) => addMarker(item, selectedPowerTypes));
        index += batch.length;

        statusEl.textContent = `正在渲染点位 ${index}/${items.length}...`;

        if (index < items.length) {
          requestAnimationFrame(renderBatch);
          return;
        }

        statusEl.textContent = `已加载 ${items.length} 个点位，卫星图预览完成。`;
        if (items.length > 0) {
          const bounds = new google.maps.LatLngBounds();
          items.forEach((item) => {
            bounds.extend(createLocation(Number(item.lon), Number(item.lat)));
          });
          map.fitBounds(bounds, 48);
        }
      }

      renderBatch();
    }

    function getSelectedPowerTypes() {
      return new Set(
        Array.from(filterListEl.querySelectorAll('input[data-role="power-type"]:checked')).map((input) => input.value)
      );
    }

    function syncSelectAllCheckbox() {
      const allCheckbox = filterListEl.querySelector('input[data-role="select-all"]');
      const typeCheckboxes = Array.from(filterListEl.querySelectorAll('input[data-role="power-type"]'));
      if (!allCheckbox || typeCheckboxes.length === 0) {
        return;
      }

      const checkedCount = typeCheckboxes.filter((input) => input.checked).length;
      allCheckbox.checked = checkedCount === typeCheckboxes.length;
      allCheckbox.indeterminate = checkedCount > 0 && checkedCount < typeCheckboxes.length;
    }

    function applyPowerTypeFilter() {
      const selected = getSelectedPowerTypes();

      markerEntries.forEach(({ marker, item }) => {
        const powerType = item.power_type || "未标注";
        marker.setVisible(selected.has(powerType));
      });

      syncSelectAllCheckbox();
    }

    function renderPowerTypeFilters(items) {
      const typeMap = new Map();
      items.forEach((item) => {
        const powerType = item.power_type || "未标注";
        typeMap.set(powerType, (typeMap.get(powerType) || 0) + 1);
      });

      const sortedTypes = Array.from(typeMap.entries()).sort((a, b) => a[0].localeCompare(b[0], "zh-CN"));
      filterListEl.innerHTML = "";

      if (sortedTypes.length > 0) {
        const allLabel = document.createElement("label");
        allLabel.className = "filter-item filter-item--all";

        const allCheckbox = document.createElement("input");
        allCheckbox.type = "checkbox";
        allCheckbox.checked = true;
        allCheckbox.dataset.role = "select-all";
        allCheckbox.addEventListener("change", function () {
          const checked = allCheckbox.checked;
          Array.from(filterListEl.querySelectorAll('input[data-role="power-type"]')).forEach((input) => {
            input.checked = checked;
          });
          applyPowerTypeFilter();
        });

        const allText = document.createElement("span");
        allText.textContent = "全部";

        allLabel.appendChild(allCheckbox);
        allLabel.appendChild(allText);
        filterListEl.appendChild(allLabel);
      }

      sortedTypes.forEach(([powerType, count]) => {
        const label = document.createElement("label");
        label.className = "filter-item";

        const checkbox = document.createElement("input");
        checkbox.type = "checkbox";
        checkbox.value = powerType;
        checkbox.checked = DEFAULT_VISIBLE_POWER_TYPES.has(powerType);
        checkbox.dataset.role = "power-type";
        checkbox.addEventListener("change", applyPowerTypeFilter);

        const text = document.createElement("span");
        text.textContent = `${powerType} (${count})`;

        label.appendChild(checkbox);
        label.appendChild(text);
        filterListEl.appendChild(label);
      });

      filtersEl.hidden = sortedTypes.length === 0;
      syncSelectAllCheckbox();
    }

    function init() {
      if (!initMap()) {
        return;
      }

      const cache = window.GEOCODE_CACHE;
      if (!cache || typeof cache !== "object") {
        showError("未找到缓存数据。请先运行 address_geocoder.py 生成 tianditu_geocode_cache.js。");
        return;
      }

      const entries = Object.entries(cache).map(([query, value]) => ({
        query: value.query || query,
        ...value,
      }));
      successItems = entries.filter((item) => item.status === "success" && item.lon && item.lat);

      totalCountEl.textContent = String(entries.length);
      successCountEl.textContent = String(successItems.length);
      statsEl.hidden = false;
      renderPowerTypeFilters(successItems);

      addMarkersInBatches(successItems);
    }

    loadGoogleMapsScript();
  </script>
</body>
</html>
